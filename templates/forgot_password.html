{% extends "base.html" %}

{% block title %}Mot de passe oublié{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-box" style="max-width: 520px;">
        <h1>📧 Mot de passe oublié</h1>
        <p class="subtitle" style="margin-bottom: 1.5rem;">
            Saisissez votre identifiant. Si un compte actif avec une adresse email existe, un mot de passe temporaire vous sera envoyé.
        </p>

        <form method="POST" action="{{ url_for('auth.mot_de_passe_oublie') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label for="login">Identifiant</label>
                <input type="text" id="login" name="login" required autofocus value="{{ request.form.get('login', '') }}">
            </div>

            <button type="submit" class="btn btn-primary btn-full">Envoyer un mot de passe temporaire</button>
        </form>

        <div style="margin-top: 1rem; text-align: center;">
            <a href="{{ url_for('auth.login') }}">Retour à la connexion</a>
        </div>
    </div>
</div>
{% endblock %}
