{% extends "base.html" %}

{% block title %}Connexion - CS-PILOT{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-box">
        <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:1.5rem;">
            <img src="{{ url_for('static', filename='img/petit-logo.png') }}" alt="" style="height:64px;width:auto;">
            <div style="line-height:1.2;">
                <div style="font-size:1.4rem;font-weight:700;color:var(--gray-900);">CS-PILOT</div>
                <div style="font-size:0.75rem;color:var(--gray-500);">La plateforme libre des centres sociaux</div>
            </div>
        </div>
        <h1>🔐 Connexion</h1>
        
        <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="login">Identifiant</label>
                <input type="text" id="login" name="login" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full">Se connecter</button>
        </form>

        <div style="margin-top: 1rem; text-align: center;">
            <a href="{{ url_for('auth.mot_de_passe_oublie') }}" style="font-size: 0.95rem;">Mot de passe oublié ?</a>
        </div>
        
        <div class="login-help">
            <p>Contactez votre administrateur si vous n'avez pas encore d'identifiants.</p>
        </div>
    </div>
</div>
{% endblock %}
